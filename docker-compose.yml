version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: obpi-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src:/app
      - UVICORN_WORKERS=1
    volumes:
      - ./api:/app/api
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
      - ./results:/app/results
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
